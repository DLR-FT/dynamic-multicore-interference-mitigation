primary = [0, 0]

[processes]

[processes.wasm]
id = [0, 0]
cmd = "../target/release/wasm-runner"
args = [
    "--wasm",
    "../target/wasm32-unknown-unknown/release/_2mm.wasm",
    "--fuel",
    "1000",
    "--count",
    "1",
]
cpu_core = 12
ipc_arg = "--ipc"


[processes.stress]
id = [1, 0]
cmd = "stress-ng"
args = ["--class cpu-cache"]
cpu_core = 14
